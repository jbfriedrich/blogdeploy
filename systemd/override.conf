# Drop-in over the packaged webhook.service. The Debian unit has no User=, no
# EnvironmentFile=, and runs webhook silently (no -verbose). Installed by
# cloud-init to /etc/systemd/system/webhook.service.d/override.conf.
#
#   User/Group      — run the network-triggered deploy as the unprivileged
#                     blogdeploy user instead of root (the package's default).
#   EnvironmentFile — the blogdeploy process reads SMTP_* from its environment;
#                     without this it cannot even load its config.
#   ExecStart       — re-declared to add -verbose so hook matches and command
#                     runs land in the journal (journalctl -u webhook). The empty
#                     `ExecStart=` first resets the packaged one before we set ours;
#                     the rest is identical to the package (-nopanic -hooks
#                     /etc/webhook.conf) — re-sync if a package update changes it.
[Service]
User=blogdeploy
Group=blogdeploy
EnvironmentFile=/etc/blogdeploy/.env
ExecStart=
ExecStart=/usr/bin/webhook -nopanic -verbose -hooks /etc/webhook.conf
