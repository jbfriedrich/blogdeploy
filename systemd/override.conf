# Drop-in over the packaged webhook.service (Debian's unit has no User= or
# EnvironmentFile=). Installed by cloud-init to:
#   /etc/systemd/system/webhook.service.d/override.conf
# It changes nothing else about the packaged unit — same binary, same
# `-hooks /etc/webhook.conf`, same default :9000 on all interfaces.
#
#   User/Group  — run the network-triggered deploy as the unprivileged
#                 blogdeploy user instead of root (the package's default).
#   EnvironmentFile — the blogdeploy process reads SMTP_* from its environment;
#                 without this it cannot even load its config.
[Service]
User=blogdeploy
Group=blogdeploy
EnvironmentFile=/etc/blogdeploy/.env
